<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音合成 TTS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 14px 16px;
            border: 2px solid #e1e5eb;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
            transition: border-color 0.3s;
            font-family: inherit;
            line-height: 1.6;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-success {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: #fff;
        }
        .btn-success:hover { opacity: 0.9; transform: translateY(-1px); }

        .status {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .status.loading {
            display: block;
            background: #f0f4ff;
            color: #667eea;
            border: 1px solid #d0d9ff;
        }
        .status.success {
            display: block;
            background: #e8f8f0;
            color: #11998e;
            border: 1px solid #b8ebc0;
        }
        .status.error {
            display: block;
            background: #fff0f0;
            color: #e74c3c;
            border: 1px solid #fcc;
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .history {
            margin-top: 24px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .history h3 {
            color: #555;
            margin-bottom: 12px;
            font-size: 16px;
        }
        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: 8px;
            background: #f8f9fc;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .history-item .text-preview {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #333;
        }
        .history-item .time {
            color: #999;
            margin: 0 12px;
            white-space: nowrap;
            font-size: 12px;
        }
        .history-item .play-btn {
            background: #667eea;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 4px 12px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .history-item .play-btn:hover { background: #5566d0; }

        .char-count {
            text-align: right;
            color: #aaa;
            font-size: 13px;
            margin-top: 6px;
        }
        .char-count.warn { color: #e67e22; }
        .char-count.over { color: #e74c3c; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔊 语音合成</h1>
    <p class="subtitle">输入文字，生成语音文件</p>

    <div class="input-group">
        <label for="textInput">输入文本</label>
        <textarea id="textInput" placeholder="请输入要合成语音的文字..." maxlength="500">你好，欢迎使用语音合成服务。</textarea>
        <div class="char-count" id="charCount">0 / 500</div>
    </div>

    <button class="btn btn-primary" id="submitBtn" onclick="submitTTS()">
        🎤 生成语音
    </button>

    <div class="status" id="status"></div>

    <div class="history" id="historySection" style="display:none">
        <h3>📋 生成记录</h3>
        <div class="history-list" id="historyList"></div>
    </div>
</div>

<audio id="audioPlayer" style="display:none"></audio>

<script>
    const textInput = document.getElementById('textInput');
    const charCount = document.getElementById('charCount');
    const submitBtn = document.getElementById('submitBtn');
    const statusEl = document.getElementById('status');
    const historyList = document.getElementById('historyList');
    const historySection = document.getElementById('historySection');
    const audioPlayer = document.getElementById('audioPlayer');

    const MAX_LENGTH = 500;
    const API_BASE = 'http://localhost:7070';
    let history = JSON.parse(localStorage.getItem('ttsHistory') || '[]');

    function updateCharCount() {
        const len = textInput.value.length;
        charCount.textContent = `${len} / ${MAX_LENGTH}`;
        charCount.className = 'char-count' + (len > MAX_LENGTH * 0.8 ? ' warn' : '') + (len >= MAX_LENGTH ? ' over' : '');
        submitBtn.disabled = len === 0 || len > MAX_LENGTH;
    }

    textInput.addEventListener('input', updateCharCount);
    updateCharCount();

    function setStatus(type, msg) {
        statusEl.className = 'status ' + type;
        statusEl.innerHTML = msg;
    }

    function submitTTS() {
        const text = textInput.value.trim();
        if (!text) {
            setStatus('error', '⚠️ 请输入文字');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span> 正在生成...';
        setStatus('loading', '<span class="spinner"></span> 正在请求语音合成...');

        fetch(API_BASE + '/audio/tts/play', {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
            body: text
        })
        .then(res => {
            if (!res.ok) throw new Error('请求失败: HTTP ' + res.status);
            return res.blob();
        })
        .then(blob => {
            // 试听
            const url = URL.createObjectURL(blob);
            audioPlayer.src = url;
            audioPlayer.play();
            setStatus('success', '✅ 生成成功，正在播放');
            submitBtn.innerHTML = '🎤 生成语音';

            // 添加到历史记录
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN');
            history.unshift({ text: text, time: timeStr, timestamp: now.getTime() });
            if (history.length > 20) history.pop();
            localStorage.setItem('ttsHistory', JSON.stringify(history));
            renderHistory();
        })
        .catch(err => {
            setStatus('error', '❌ ' + err.message);
        })
        .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '🎤 生成语音';
        });
    }

    function renderHistory() {
        if (history.length === 0) {
            historySection.style.display = 'none';
            return;
        }
        historySection.style.display = 'block';
        historyList.innerHTML = history.map((item, idx) => `
            <div class="history-item">
                <span class="text-preview" title="${escapeHtml(item.text)}">${escapeHtml(item.text)}</span>
                <span class="time">${item.time}</span>
                <button class="play-btn" onclick="playAudio('${escapeHtml(item.text)}')">▶ 试听</button>
                <button class="play-btn" style="background:#e74c3c;margin-left:4px" onclick="removeHistory(${idx})">✕</button>
            </div>
        `).join('');
    }

    function playAudio(text) {
        // 重新生成并播放 (或尝试播放已存在的文件)
        setStatus('loading', '<span class="spinner"></span> 正在生成并播放...');
        fetch(API_BASE + '/audio/tts/play', {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
            body: text
        })
        .then(res => {
            if (!res.ok) throw new Error('请求失败');
            return res.blob();
        })
        .then(blob => {
            const url = URL.createObjectURL(blob);
            audioPlayer.src = url;
            audioPlayer.play();
            setStatus('success', '▶️ 正在播放');
        })
        .catch(err => {
            setStatus('error', '❌ 播放失败: ' + err.message);
        });
    }

    function removeHistory(idx) {
        history.splice(idx, 1);
        localStorage.setItem('ttsHistory', JSON.stringify(history));
        renderHistory();
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // 初始渲染历史
    renderHistory();

    // 支持 Ctrl+Enter 快捷提交
    textInput.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            e.preventDefault();
            submitTTS();
        }
    });
</script>
</body>
</html>
