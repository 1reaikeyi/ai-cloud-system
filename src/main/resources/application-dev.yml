aigc:
  #数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    host: localhost
    port: 3306
    database: use_aigc
    username: root
    password: ${MYSQL_PASSWORD}
  #redis配置文件
  redis:
    host: 192.168.80.128
    port: 6379
    password: ${MYSQL_PASSWORD}
    database: 1

spring:
  ai:
    openai:
      base-url: https://api-inference.modelscope.cn
      api-key: ${PATH_ai_qwen_api}
      chat:
        options:
          model: Qwen/Qwen3-14B
      embedding:
        options:
          model: Qwen/Qwen3-Embedding-4B
          dimensions: 1024
          encoding-format: float
          # temperature: 0.7       # 温度参数，控制输出随机性
          # max-tokens: 1024       # 最大输出token数
          # top-p: 0.9             # 核采样参数

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    #开启驼峰命名
    map-underscore-to-camel-case: true
  #mapper配置文件
  mapper-locations: classpath:mapper/**/*.xml
