# AIGC MySQL
aigc.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
aigc.datasource.host=localhost
aigc.datasource.port=3306
aigc.datasource.database=use_aigc
aigc.datasource.username=root
aigc.datasource.password=${MYSQL_PASSWORD}

# AIGC Redis
aigc.redis.host=192.168.80.128
aigc.redis.port=6379
aigc.redis.password=${MYSQL_PASSWORD}
aigc.redis.database=1

# chat model
spring.ai.openai.base-url=https://api-inference.modelscope.cn
spring.ai.openai.api-key=${PATH_ai_qwen_api}
spring.ai.openai.chat.options.model=Qwen/Qwen3-32B
# spring.ai.openai.chat.options.temperature=0.7
# spring.ai.openai.chat.options.max-tokens=1024
# spring.ai.openai.chat.options.top-p=0.9

# embedding model
spring.ai.openai.embedding.options.model=Qwen/Qwen3-Embedding-4B
spring.ai.openai.embedding.options.dimensions=1024
spring.ai.openai.embedding.options.encoding-format=float

# redis-stack作为向量库
spring.ai.vectorstore.redis.host=192.168.80.128
spring.ai.vectorstore.redis.port=16379
spring.ai.vectorstore.redis.password=${MYSQL_PASSWORD}
spring.ai.vectorstore.redis.database=0
spring.ai.vectorstore.redis.initialize-schema=true
spring.ai.vectorstore.redis.index-name=spring-ai-index
spring.ai.vectorstore.redis.prefix=embedding:

# MyBatis-Plus
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.mapper-locations=classpath:mapper/**/*.xml
