spring:
  application:
    name: qwen
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  # 图片上传限制
image:
  max-width: 2048
  max-height: 2048
  ai:
    openai:
      base-url: https://api-inference.modelscope.cn
      api-key: ${PATH_ai_qwen_api}
      chat:
        options:
          model: Qwen/Qwen3.5-27B

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/use_take_out
    username: root
    password: ${MYSQL_PASSWORD}



logging:
  charset:
    console: UTF-8
  level:
    # Spring AI
    org.springframework.ai: debug
    # HTTP
    org.springframework.web.client: debug
